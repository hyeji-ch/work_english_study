<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Work English Study</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <h1>Work English Study</h1>
        <p>Antibody Engineering / Biotherapeutics R&amp;D</p>
      </div>
      <div class="summary-pill" id="total-progress">Loading...</div>
    </header>

    <nav class="mode-menu" aria-label="Study mode">
      <button class="mode-button active" type="button" data-mode="daily">Daily Study</button>
      <button class="mode-button" type="button" data-mode="tag">Tag Review</button>
      <button class="mode-button" type="button" data-mode="review">다시 볼 문장</button>
    </nav>

    <section class="filter-panel hidden" id="filter-panel">
      <div class="filter-status" id="filter-status">No tag filter selected.</div>
      <button class="clear-button" id="clear-filter" type="button">Clear filter</button>
      <div class="filter-groups" id="filter-groups"></div>
    </section>
    <section class="voice-panel" id="voice-panel">
      <span id="speech-support">Voice: checking browser support...</span>
      <label>
        Voice
        <select id="voice-mode">
          <option value="auto">Auto</option>
          <option value="en-US">US English</option>
          <option value="en-GB">UK English</option>
        </select>
      </label>
      <label>
        Speed
        <select id="voice-rate">
          <option value="0.8">0.8</option>
          <option value="1.0" selected>1.0</option>
          <option value="1.1">1.1</option>
        </select>
      </label>
    </section>

    <section class="day-nav" aria-label="Day navigation">
      <button id="prev-day" type="button">Previous Day</button>
      <div class="day-display">
        <strong id="week-day-label">Week 1 / Day 1</strong>
        <span id="day-count-label">Day 1 of 56</span>
      </div>
      <button id="next-day" type="button">Next Day</button>
    </section>

    <section class="day-progress" id="day-progress"></section>
    <section class="cards" id="cards"></section>

    <footer class="footer-summary">
      <span id="mastered-count">익힌 문장: 0</span>
      <span id="review-count">다시 볼 문장: 0</span>
      <span id="not-yet-count">아직: 0</span>
    </footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
