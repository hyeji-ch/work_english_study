<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Work English Study</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="eyebrow">BIOTHERAPEUTICS R&amp;D ENGLISH</div>
      <h1>Work English Study</h1>
      <p class="lede">Antibody engineering, TCE, SPR/FACS/ELISA, CRO communication, and internal reporting.</p>
      <section class="dash" aria-label="Progress dashboard">
        <div class="stat">
          <div class="cap">전체 진도</div>
          <div class="num" id="dash-day">1<span class="small">/56</span></div>
        </div>
        <div class="stat learned">
          <div class="cap">익힌 문장</div>
          <div class="num" id="dash-mastered">0</div>
        </div>
        <div class="stat review">
          <div class="cap">다시 볼 문장</div>
          <div class="num" id="dash-review">0</div>
        </div>
      </section>
    </header>

    <main>
      <section id="view-today" class="view on"></section>
      <section id="view-cards" class="view"></section>
      <section id="view-situations" class="view"></section>
      <section id="view-roadmap" class="view"></section>
      <section id="view-patterns" class="view"></section>
    </main>
  </div>

  <nav class="bottom-nav" aria-label="Main navigation">
    <div class="nav-inner">
      <button type="button" class="nav-btn on" data-view="today"><span>오늘 학습</span></button>
      <button type="button" class="nav-btn" data-view="cards"><span>복습 카드</span></button>
      <button type="button" class="nav-btn" data-view="situations"><span>상황별 표현</span></button>
      <button type="button" class="nav-btn" data-view="roadmap"><span>로드맵</span></button>
      <button type="button" class="nav-btn" data-view="patterns"><span>패턴</span></button>
    </div>
  </nav>

  <script src="app.js"></script>
</body>
</html>
